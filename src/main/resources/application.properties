# 기본설정
spring.application.name=spring-board-app
server.servlet.context-path=/

# DataSource(커넥션풀) 설정
spring.datasource.url=jdbc:mysql://localhost:3306/board
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=board
spring.datasource.password=1234

#Mybatis 설정
mybatis.mapper-locations=classpath:mappers/**/*.xml

# JPA 설정
# ddl-auto=create : 엔티티를 기준으로 기존 테이블 삭제 후 다시 생성
# ddl-auto=update : 엔티티를 기준으로 기존 테이블 수정(개발용)
# ddl-auto=none : 엔티티를 기준으로 테이블 생성하지 않음(배포용)
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# LOG 설정
logging.level.root=info
logging.file.name=/logs/spring-board-app.log
