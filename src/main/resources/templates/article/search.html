<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>글검색</title>
    <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div id="wrapper">
    <th:block th:include="~{/article/_head.html}"/>
    <main id="article">
        <section class="list">
            <nav>
                <h1>
                    검색 글목록
                    <span>[[${pageResponseDTO.total}]]건</span>
                </h1>
                <form th:action="@{/article/search}">
                    <select name="searchType">
                        <option value="title"   th:selected="${pageResponseDTO.searchType == 'title'}">제목</option>
                        <option value="content" th:selected="${pageResponseDTO.searchType == 'content'}">내용</option>
                        <option value="writer"  th:selected="${pageResponseDTO.searchType == 'writer'}">글쓴이</option>
                    </select>
                    <input type="text" name="keyword" th:value="${pageResponseDTO.keyword}" placeholder="검색 키워드 입력">
                    <input type="submit" value="검색">
                </form>
            </nav>

            <table border="0">
                <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>글쓴이</th>
                    <th>날짜</th>
                    <th>조회</th>
                </tr>
                <tr th:each="dto, stat:${pageResponseDTO.dtoList}">
                    <td>[[${pageResponseDTO.startNo - stat.index}]]</td>
                    <td><a th:href="@{/article/view}">[[${dto.title}]]&nbsp;&#91;[[${dto.comment}]]&#93;</a></td>
                    <td>[[${dto.nick}]]</td>
                    <td>[[${dto.wdate.substring(2, 16)}]]</td>
                    <td>[[${dto.hit}]]</td>
                </tr>
            </table>

            <div class="page">

                <a th:if="${pageResponseDTO.prev}"
                   th:href="@{/article/search(page=${pageResponseDTO.start - 1}, searchType=${pageResponseDTO.searchType}, keyword=${pageResponseDTO.keyword})}"
                   class="prev"
                >이전</a>

                <th:block th:each="num:${#numbers.sequence(pageResponseDTO.start, pageResponseDTO.end)}">
                    <a th:href="@{/article/search(page=${num}, searchType=${pageResponseDTO.searchType}, keyword=${pageResponseDTO.keyword})}"
                       class="num"
                       th:classappend="${num == pageResponseDTO.page} ? 'current' : 'off'"
                    >[[${num}]]</a>
                </th:block>

                <a th:if="${pageResponseDTO.next}"
                   th:href="@{/article/search(page=${pageResponseDTO.end + 1}, searchType=${pageResponseDTO.searchType}, keyword=${pageResponseDTO.keyword})}"
                   class="next"
                >다음</a>

            </div>

            <a th:href="@{/article/write}" class="btn btnWrite">글쓰기</a>

        </section>
    </main>
    <th:block th:include="~{/article/_tail.html}"/>
</div>
</body>
</html>
